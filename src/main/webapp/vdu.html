<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>VDU表示</title>
  <style>
    body { font-family: sans-serif; margin: 12px; }
    .info-box {
      margin-bottom: 12px;
      padding: 10px;
      border: 1px solid #ccc;
      background: #f7f7f7;
    }
    .line { margin-bottom: 6px; }
    iframe {
      width: 100%;
      height: 720px;
      border: 1px solid #333;
      background: #fff;
    }
  </style>
</head>
<body>
  <h1 id="vduTitle">VDU</h1>

  <div class="info-box">
    <div class="line">現在操作者: <span id="currentOperator">-</span></div>
    <div class="line">操作者IP: <span id="currentOperatorIp">-</span></div>
    <div class="line">状態: <span id="playStatus">-</span></div>
    <div class="line">開始日時: <span id="startDateTimeLabel">-</span></div>
    <div class="line">表示期間: <span id="periodHoursLabel">-</span></div>
    <div class="line">現在位置: <span id="currentReplayTimeLabel">-</span></div>
    <div class="line">速度: <span id="speedLabel">-</span></div>
    <div class="line">表示URL: <span id="displayUrlLabel">-</span></div>
    <div class="line">現在PageId: <span id="currentPageIdLabel">-</span></div>
    <div class="line">最終イベントID: <span id="lastAppliedEventIdLabel">-</span></div>
    <div class="line">最終イベント種別: <span id="lastAppliedEventTypeLabel">-</span></div>
    <div class="line">最終適用結果: <span id="lastApplyResultLabel">-</span></div>
    <div class="line">最終操作時刻: <span id="lastAppliedOccurredAtLabel">-</span></div>
    <div class="line">controlId: <span id="lastControlIdLabel">-</span></div>
    <div class="line">symbolId: <span id="lastSymbolIdLabel">-</span></div>
    <div class="line">value: <span id="lastValueLabel">-</span></div>
  </div>

  <iframe id="replayFrame" src="about:blank"></iframe>

  <script src="js/replay_ws.js"></script>
  <script>
    (function () {
      var params = new URLSearchParams(location.search);
      var vduNo = params.get("vdu") || "1";
      document.getElementById("vduTitle").textContent = "VDU" + vduNo;
      if (window.ReplayWs) {
        window.ReplayWs.connect("global", "VDU", vduNo);
        window.ReplayWs.fetchCurrentState(vduNo);
      }
    })();
  </script>
</body>
</html>
